<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Information Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 50px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background:rgb(225, 228, 229);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(16, 1, 1, 0.1);
    }
    h1 {
      text-align: center;
      color: #0c0404;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }
    input[type="text"], input[type="email"], input[type="date"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid rgb(20, 7, 7);
      border-radius: 4px;
    }
    input[type="submit"] {
      background-color: #2a6a2a;
      color: rgb(244, 243, 243);
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #1b681b;
    }
  </style>
</head>
<body>
    <div class="container">
        <h1>Student Information Form</h1>
        <form action="/submit" method="post">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
    
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
    
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" placeholder="Enter your date of birth" required>
    
          <label for="address">Address</label>
          <input type="text" id="address" name="address" placeholder="Enter your address" required>
    
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" placeholder="Enter your phone number" required>
    
          <input type="submit" value="Submit">
        </form>
      </div>
</body>
</html>
